{% set name = "langchain-nomic" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/langchain_nomic-{{ version }}.tar.gz
  sha256: f897592256cd3c06e88720c6a94e17168a6460523d86067c51bb07ab00243169

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pdm-backend
    - pip
  run:
    - python >={{ python_min }},<4.0
    - langchain-core >=1.0.0,<2.0.0
    - nomic >=3.5.3,<4.0.0
    - pillow >=10.3.0,<11.0.0

test:
  imports:
    - langchain_nomic
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/langchain-ai/langchain
  summary: An integration package connecting Nomic and LangChain
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
